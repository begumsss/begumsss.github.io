<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begüm'ün Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Genel Ayarlar - SİYAH TEMA */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #121212; /* Siyah arka plan */
            color: #ffffff; /* Beyaz metin */
            scroll-behavior: smooth;
        }

        /* 1. Karşılama Ekranı (Hero Section) */
        .hero {
            height: 100vh;
            /* FOTOĞRAF KISMI: Kendi fotoğrafını yüklediğinde adını buraya yazacağız */
            background-image: url('benim-fotografim.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #000; /* Fotoğraf yüklenene kadar siyah dursun */
        }

        /* ANİMASYON EKLENDİ */
        .hero h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 6rem;
            color: #fff;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.8);
            margin: 0;
            letter-spacing: 2px;
            animation: yukariKayarakBelir 2s ease-out forwards;
            opacity: 0; /* Başlangıçta görünmez */
        }

        @keyframes yukariKayarakBelir {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Bölüm Başlıkları */
        h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff; /* Beyaz başlıklar */
        }

        /* Türkçe karakter sorunu olan başlık için özel class */
        .duz-font {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 2.5rem;
        }

        /* 2. Kitaplık Bölümü */
        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .bookshelf {
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 15px solid #4a4a4a; /* Gri/Siyah raf görünümü */
            padding-bottom: 0;
            align-items: flex-end;
            height: 250px;
        }

        .book {
            width: 50px;
            height: 200px;
            background-color: #e74c3c;
            border-radius: 3px 3px 0 0;
            color: white;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }

        .book:hover { transform: translateY(-20px); }
        .book:nth-child(2) { background-color: #3498db; height: 220px; }
        .book:nth-child(3) { background-color: #f1c40f; height: 180px; color: #333; }
        .book:nth-child(4) { background-color: #2ecc71; height: 210px; }

        /* 3. İşlerim (Klasörler) Bölümü */
        .folders {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .folder {
            background-color: #f39c12;
            height: 150px;
            border-radius: 5px 15px 5px 5px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            padding: 10px;
            text-decoration: none;
        }

        .folder::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            width: 80px;
            height: 15px;
            background-color: #e67e22;
            border-radius: 10px 10px 0 0;
        }

        .folder:hover {
            transform: scale(1.05);
            background-color: #e67e22;
        }

        /* 4. Seyahatler (Uçak) Bölümü */
        .travel {
            text-align: center;
            background-color: #1a1a1a; /* Koyu gri arka plan */
            border-radius: 20px;
            padding: 50px 20px;
            border: 1px solid #333;
        }

        .plane-icon {
            font-size: 5rem;
            display: inline-block;
            transition: transform 0.5s ease;
        }
        
        .travel:hover .plane-icon {
            transform: translateX(50px) translateY(-20px);
        }
    </style>
</head>
<body>

    <!-- 1. Karşılama Ekranı -->
    <div class="hero">
        <h1>merhaba,<br>ben begüm.</h1>
    </div>

    <!-- 2. Kitaplar Rafı -->
    <div class="section">
        <h2>Okuduklarim</h2>
        <div class="bookshelf">
            <!-- 
                YENİ BİR SAYFAYA GİTMEK İÇİN: 
                href="sayfa-adi.html" yazılır. Arasındaki metin ise kitap adıdır. 
            -->
            <a href="1984.html" class="book">1984</a>
            <a href="madonna.html" class="book">Kürk Mantolu Madonna</a>
            <a href="saatleri-ayarlama.html" class="book">Saatleri Ayarlama Enstitüsü</a>
            <a href="gorsel-dusunme.html" class="book">Görsel Düşünme</a>
        </div>
    </div>

    <!-- 3. İşlerim Klasörleri -->
    <div class="section">
        <!-- Türkçe karakter düzeltmesi yapılmış başlık -->
        <h2 class="duz-font">İşlerim</h2>
        <div class="folders">
            <a href="baska-kent.html" class="folder">Başka Kent Sokakları</a>
            <a href="cam-fuzyon.html" class="folder">Cam Füzyon Tasarımları</a>
            <a href="arayuz.html" class="folder">Arayüz (UI) Projeleri</a>
            <a href="marka.html" class="folder">Marka Kimliği</a>
        </div>
    </div>

    <!-- 4. Seyahatler -->
    <div class="section travel">
        <h2>Seyahatlerim</h2>
        <div class="plane-icon">✈️</div>
        <p>Gezdiğim, gördüğüm ve ilham aldığım yerler yakında burada...</p>
    </div>

</body>
</html>
